<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카카오 API 테스트</title>
<style>
  body { font-family: monospace; background: #0a0a0f; color: #e8e4dc; padding: 24px; }
  button { background: #ff3c5f; color: #fff; border: none; padding: 12px 24px; font-size: 1rem; cursor: pointer; margin: 8px 0; border-radius: 4px; }
  #result { margin-top: 20px; background: #12121a; padding: 16px; border-radius: 8px; white-space: pre-wrap; font-size: 0.8rem; line-height: 1.8; }
  .ok { color: #4ade80; }
  .err { color: #ff3c5f; }
</style>
</head>
<body>
<h2>카카오 로컬 API 테스트</h2>
<button onclick="testGPS()">1. GPS 위치 잡기</button>
<button onclick="testKakao()">2. 카카오 API 호출</button>
<div id="result">버튼을 순서대로 눌러주세요...</div>

<script>
const KAKAO_KEY = '3ddfe235ce5d1c2659b31318737c3101';
let myLat = null, myLng = null;

function log(msg, ok) {
  const el = document.getElementById('result');
  const cls = ok === true ? 'ok' : ok === false ? 'err' : '';
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
}

function testGPS() {
  document.getElementById('result').innerHTML = '';
  log('📡 GPS 요청 중...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      myLat = pos.coords.latitude;
      myLng = pos.coords.longitude;
      log(`✅ GPS 성공!`, true);
      log(`위도: ${myLat}`, true);
      log(`경도: ${myLng}`, true);
      log(`정확도: ${pos.coords.accuracy}m`, true);
    },
    err => log(`❌ GPS 실패: ${err.message}`, false),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

async function testKakao() {
  if (!myLat) { log('❌ 먼저 GPS를 잡아주세요!', false); return; }
  log('\n☕ 카카오 API 호출 중...');
  try {
    const url = `https://dapi.kakao.com/v2/local/search/category.json?category_group_code=CE7&x=${myLng}&y=${myLat}&radius=1000&sort=distance&size=5`;
    const res = await fetch(url, {
      headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
    });
    const data = await res.json();
    if (data.documents && data.documents.length > 0) {
      log(`✅ 카카오 API 성공! ${data.documents.length}개 카페 발견`, true);
      data.documents.forEach((d, i) => {
        log(`  ${i+1}. ${d.place_name} (${d.distance}m)`, true);
      });
    } else {
      log(`⚠️ 응답은 왔지만 카페 없음: ${JSON.stringify(data)}`, false);
    }
  } catch(e) {
    log(`❌ API 호출 실패: ${e.message}`, false);
  }
}
</script>

</body>
</html>
